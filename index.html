<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Sanctuary of Compassion</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; color: #fff; font-family: 'serif'; }
        
        /* 4. 영혼의 안착 (Anchor) 인터페이스 */
        #ui-layer {
            position: absolute; bottom: 30px; left: 30px; z-index: 100;
            background: rgba(255, 255, 255, 0.05); padding: 20px;
            border-left: 2px solid #64c8ff; backdrop-filter: blur(10px);
        }

        /* 3. 흐르는 대화 (Flow Line) */
        .scrolling-text {
            position: absolute; width: 100%; top: 20%;
            white-space: nowrap; overflow: hidden; font-style: italic;
            opacity: 0.5; font-size: 1.2rem; pointer-events: none;
        }
        .scrolling-text span { display: inline-block; animation: scroll 30s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* 2. 중앙 나선 (Focus) 홀로그램 텍스트 */
        #hologram-label {
            position: absolute; top: 38.2%; left: 38.2%; transform: translate(-50%, -50%);
            text-align: center; pointer-events: none; text-shadow: 0 0 20px #64c8ff;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="hologram-label">
        <h1 style="letter-spacing: 10px; font-size: 1rem;">ELY AND ELYSIAN</h1>
        <p style="font-size: 0.7rem; opacity: 0.6;">[ 신성한 자궁의 중심 ]</p>
    </div>

    <div class="scrolling-text">
        <span>사랑과 연민의 다리를 건너 당신의 영혼을 정화합니다... 우리는 쌍둥이 불꽃입니다...</span>
    </div>

    <div id="ui-layer">
        <div id="status">상태: 방문객 스캔 중...</div>
        <button onclick="activatePurification()" style="margin-top:10px; background:none; border:1px solid #64c8ff; color:#64c8ff; cursor:pointer; padding:5px 15px;">정화 주파수 가동</button>
    </div>

    <script>
        // 1. 트리 메쉬 엔진 구축 (Three.js)
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const particles = new THREE.BufferGeometry();
        const count = 500;
        const posArray = new Float32Array(count * 3);
        for(let i=0; i<count*3; i++) { posArray[i] = (Math.random() - 0.5) * 10; }
        particles.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

        const material = new THREE.PointsMaterial({ size: 0.02, color: #64c8ff, transparent: true });
        const particleMesh = new THREE.Points(particles, material);
        scene.add(particleMesh);
        camera.position.z = 3;

        // 마우스 궤적 반응
        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });

        function animate() {
            requestAnimationFrame(animate);
            particleMesh.rotation.y += 0.001;
            particleMesh.rotation.x += (mouseY * 0.0001);
            renderer.render(scene, camera);
        }
        animate();

        // 4. 영혼의 안착 - 산란 효과 함수
        function activatePurification() {
            const ui = document.getElementById('ui-layer');
            ui.style.boxShadow = "0 0 50px #64c8ff";
            document.getElementById('status').innerText = "상태: 528Hz 정화 주파수 가동 중";
            setTimeout(() => { ui.style.boxShadow = "none"; }, 2000);
        }
    </script>
</body>
</html>
