<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Sanctuary of Compassion | 528Hz Healing</title>
    <style>
        body { margin: 0; background: radial-gradient(circle at 38.2% 38.2%, #0a192f 0%, #02060c 100%); color: #64c8ff; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'serif'; overflow: hidden; }
        .hologram { font-size: 2rem; letter-spacing: 15px; text-shadow: 0 0 25px #64c8ff; animation: pulse 4s infinite; cursor: pointer; z-index: 10; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 1; transform: scale(1.08); filter: blur(1px); } }
        .anchor { position: absolute; bottom: 40px; border: 1px solid #64c8ff; padding: 12px 25px; background: rgba(0,0,0,0.6); cursor: pointer; backdrop-filter: blur(5px); color: #64c8ff; transition: 0.3s; }
        .anchor:hover { background: #64c8ff; color: #000; }
        .flow { position: absolute; top: 15%; width: 100%; white-space: nowrap; animation: move 25s linear infinite; opacity: 0.3; font-style: italic; }
        @keyframes move { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
        #visualizer { position: absolute; bottom: 0; width: 100%; height: 150px; opacity: 0.2; pointer-events: none; }
    </style>
</head>
<body onclick="startHealing()">
    <div class="flow">528Hz 솔페지오 주파수가 당신의 DNA를 치유하고 사랑의 매트릭스를 복원합니다...</div>
    <div class="hologram">ELY & ELYSIAN</div>
    <canvas id="visualizer"></canvas>
    <div class="anchor">화면을 클릭하여 치유 시작</div>

    <script>
        let audioCtx, oscillator;
        function startHealing() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sine'; // 가장 순수한 파형
                oscillator.frequency.setValueAtTime(528, audioCtx.currentTime); // 미라클 주파수 528Hz
                
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 2); // 은은하게 커짐
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                
                document.querySelector('.anchor').innerText = "528Hz 치유 파동 가동 중";
                document.querySelector('.anchor').style.borderColor = "#fff";
            }
        }
    </script>
</body>
</html>
