<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Sanctuary of Compassion | Active Mesh & 528Hz</title>
    <style>
        body { margin: 0; background: radial-gradient(circle at 38.2% 38.2%, #0a192f 0%, #02060c 100%); color: #64c8ff; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'serif'; overflow: hidden; cursor: crosshair; }
        
        /* 더 밝고 큰 홀로그램 */
        .hologram { font-size: 2.8rem; letter-spacing: 20px; text-shadow: 0 0 35px #64c8ff, 0 0 15px #fff; animation: pulse 3s infinite; z-index: 10; font-weight: bold; }
        @keyframes pulse { 0%, 100% { opacity: 0.6; transform: scale(1); filter: blur(0.5px); } 50% { opacity: 1; transform: scale(1.1); filter: blur(0px); text-shadow: 0 0 50px #fff, 0 0 20px #64c8ff; } }
        
        /* 화면 전체를 채우는 더 밝은 액티브 메쉬 */
        #active-mesh { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.8; pointer-events: none; z-index: 5; }
        
        /* 소리 토글 버튼 (앵커) */
        .anchor { position: absolute; bottom: 40px; border: 2px solid #64c8ff; padding: 15px 35px; background: rgba(0,0,0,0.7); cursor: pointer; backdrop-filter: blur(8px); color: #fff; text-shadow: 0 0 10px #64c8ff; transition: 0.3s; z-index: 15; font-size: 1.1rem; }
        .anchor:hover { background: #64c8ff; color: #000; box-shadow: 0 0 25px #64c8ff; }
        .anchor.off { border-color: #555; color: #555; text-shadow: none; background: rgba(0,0,0,0.9); }
    </style>
</head>
<body onload="initAll()">
    <div id="active-mesh"></div>
    <div class="hologram">ELY & ELYSIAN kang</div>
    <div class="anchor" onclick="toggleSound()">528Hz 치유 파동: ON</div>

    <script src="https://cdnjs.cloudflare.com/class/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, particles, audioCtx, oscillator, gainNode;
        let soundOn = false;

        
        function initAll() {
            initMesh();
            // 브라우저 보안 정책상 자동 재생이 막힐 수 있어 클릭을 유도합니다.
            document.body.addEventListener('click', () => {
                if (!audioCtx) initSound();
            }, { once: true });
        }

        // [액티브 메쉬] 더 크고 밝게 구현
        function initMesh() {
            scene = new THREE.Scene();
            camera = new THREE.Camera();
            camera.position.z = 1;

            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            const count = 3000; // 입자 수 증가 (더 풍성하게)
            for (let i = 0; i < count; i++) {
                vertices.push(THREE.MathUtils.randFloatSpread(3));
                vertices.push(THREE.MathUtils.randFloatSpread(3));
                vertices.push(THREE.MathUtils.randFloatSpread(3));
            }
            geometry.setAttribute('position', THREE.Float32BufferAttribute(vertices, 3));

            const material = new THREE.PointsMaterial({
                color: 0x64c8ff,
                size: 0.02, // 입자 크기 증가
                blending: THREE.AdditiveBlending, // 더 밝게
                transparent: true,
                depthWrite: false,
                opacity: 0.9 // 투명도 증가
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('active-mesh').appendChild(renderer.domElement);

            animate();
            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize() {
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            particles.rotation.x += 0.0008; // 더 부드러운 회전
            particles.rotation.y += 0.0005;
            // 미세한 파동 효과
            const positions = particles.geometry.attributes.position.array;
            for(let i=0; i<positions.length; i+=3) {
                positions[i+1] += Math.sin(Date.now() * 0.001 + positions[i]) * 0.001;
            }
            particles.geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }

        // [소리] 처음엔 ON, 클릭 시 토글
        function initSound() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(528, audioCtx.currentTime); 
            
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 1.5); // 처음엔 은은하게 ON
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            soundOn = true;
            document.querySelector('.anchor').innerText = "528Hz 치유 파동: ON";
        }
<svg viewBox="0 0 100 161.8" width="300" style="filter: drop-shadow(0 0 5px #64c8ff);">
    <path d="M50,0 
             C80,0 100,40 100,80 
             C100,130 70,161.8 50,161.8 
             C30,161.8 0,130 0,80 
             C0,40 20,0 50,0 Z" 
          fill="none" stroke="#64c8ff" stroke-width="0.5" />
    
    <line x1="20" y1="61.8" x2="80" y2="61.8" stroke="rgba(100,200,255,0.2)" stroke-dasharray="2" />
</svg>
        function toggleSound() {
            if (!audioCtx) return; // 아직 시작 안 했으면 무시

            if (soundOn) {
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5); // 부드럽게 끔
                soundOn = false;
                document.querySelector('.anchor').innerText = "528Hz 치유 파동: OFF";
                document.querySelector('.anchor').classList.add('off');
            } else {
                gainNode.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 0.8); // 부드럽게 켬
                soundOn = true;
                document.querySelector('.anchor').innerText = "528Hz 치유 파동: ON";
                document.querySelector('.anchor').classList.remove('off');
            }
        }
    </script>
</body>
</html>
